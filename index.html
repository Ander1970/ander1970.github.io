<html lang="zh-TW">
<head>

     crossorigin="anonymous"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 遊戲大廳</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 背景動態粒子 -->
  <div class="bg-animation">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <!-- 頂部導航 -->
  <header class="navbar">
    <div class="logo">🎮 GameZone</div>
    <div class="nav-right">
      <span id="gameCount" class="game-count">0 款遊戲</span>
    </div>
  </header>

  <!-- Hero 區塊 -->
  <section class="hero">
    <h1 class="hero-title">歡迎來到<br><span class="highlight">遊戲大廳</span></h1>
    <p class="hero-sub">精心設計的小遊戲，隨時隨地開始挑戰！</p>

    <!-- 搜尋欄 -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋遊戲名稱...">
    </div>
  </section>

  <!-- 標籤篩選 -->
  <section class="tag-section">
    <div id="tagFilter" class="tag-list"></div>
  </section>

  <!-- 遊戲卡片區 -->
  <main class="container">
    <div id="gameGrid" class="game-grid"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <p>😢 找不到符合的遊戲</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>🎮 GameZone · 用心製作每一款遊戲</p>
    <p style="margin-top: 10px;">
      <a href="privacy.html" style="color: #ccc; text-decoration: none; font-size: 0.9rem;">隱私權政策 (Privacy Policy)</a>
    </p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
